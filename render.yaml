services:
  - type: web
    name: testimony-project
    runtime: python
    pythonVersion: 3.11
    rootDir: .
    buildCommand: |
      cd testimony_project/frontend && npm install && npm run build && cd ../.. && \
      mkdir -p testimony_project/backend/dist && \
      cp -r testimony_project/frontend/dist/* testimony_project/backend/dist/ && \
      cd testimony_project/backend && \
      pip install -r requirements.txt
    startCommand: cd testimony_project/backend && uvicorn main:app --host 0.0.0.0 --port $PORT

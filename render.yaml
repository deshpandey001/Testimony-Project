services:
  - type: web
    name: testimony-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: testimony_project/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: testimony-frontend
    runtime: node
    rootDir: testimony_project/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: https://testimony-backend-1.onrender.com
      - key: NODE_ENV
        value: production
  - type: web
    name: testimony-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: testimony_project/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  - type: web
    name: testimony-frontend
    runtime: node
    nodeVersion: 18
    rootDir: testimony_project/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: REACT_APP_API_URL
        value: https://testimony-backend.onrender.com
